<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Трекер задач</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <h1>Трекер задач</h1>

    <form class="task-form" id="task-form">
      <input
        id="task-input"
        type="text"
        placeholder="Введите задачу"
        autocomplete="off"
      >
      <button type="submit">Добавить</button>
    </form>

    <p class="counter" id="task-counter">Выполнено: 0 из 0</p>

    <div class="filters">
      <button class="filter-button active" type="button" data-filter="all">Все</button>
      <button class="filter-button" type="button" data-filter="active">Активные</button>
      <button class="filter-button" type="button" data-filter="completed">Выполненные</button>
    </div>

    <ul class="task-list" id="task-list"></ul>
  </main>

  <script src="script.js"></script>
</body>
</html>
